name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            arch: x64
            build_command: npm run make -- --arch x64
            artifact_path: |
              out/make/**/*.deb
              out/make/**/*.rpm
              out/make/**/*.zip
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            build_command: npm run make -- --arch arm64
            artifact_path: |
              out/make/**/*.deb
              out/make/**/*.rpm
              out/make/**/*.zip
          - name: macos-x64
            runner: macos-15-intel
            arch: x64
            build_command: npm run make -- --arch x64
            artifact_path: |
              out/make/**/*.dmg
              out/make/**/*.zip
          - name: macos-arm64
            runner: macos-latest
            arch: arm64
            build_command: npm run make -- --arch arm64
            artifact_path: |
              out/make/**/*.dmg
              out/make/**/*.zip
          - name: windows-x64
            runner: windows-latest
            arch: x64
            build_command: npm run dist:win
            artifact_path: |
              dist/*.exe
              dist/latest*.yml
              dist/*.blockmap

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Linux build tools
        if: startsWith(matrix.runner, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build distributables
        run: ${{ matrix.build_command }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
